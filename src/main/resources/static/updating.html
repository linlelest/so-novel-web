<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta content="width=device-width,initial-scale=1.0" name="viewport">
<title>更新中 - SoNovel</title><base href="/">
<style>:root{--primary:#5d5d81;--bg:#f8f9fa;--cb:#fff;--text:#333;--ts:#666;--shadow:0 8px 32px rgba(0,0,0,.1)}[data-theme="dark"]{--bg:#1a1a2e;--cb:#16213e;--text:#e0e0e0;--ts:#a0a0a0;--primary:#8b8bb0;--shadow:0 8px 32px rgba(0,0,0,.5)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background .3s}.ac{background:var(--cb);border-radius:16px;box-shadow:var(--shadow);padding:48px 40px;width:100%;max-width:520px;transition:background .3s;text-align:center}.icon{font-size:4rem;margin-bottom:16px;display:block}.ac h1{font-size:1.4rem;color:var(--primary);margin-bottom:12px}.ac p{color:var(--ts);font-size:.9rem;line-height:1.7}.progress-wrap{width:100%;height:6px;background:var(--ts);border-radius:3px;margin:24px 0 8px;overflow:hidden}.progress-bar{height:100%;background:var(--primary);border-radius:3px;transition:width .5s;width:0}.progress-text{font-size:.8rem;color:var(--ts);margin-bottom:16px}.pulse{display:inline-block;width:10px;height:10px;background:#e6a23c;border-radius:50%;animation:pl 1.5s ease-in-out infinite;margin-right:6px;vertical-align:middle}@keyframes pl{0%,100%{opacity:.3}50%{opacity:1}}.dot{animation:dot 1.5s infinite}.dot:nth-child(2){animation-delay:.3s}.dot:nth-child(3){animation-delay:.6s}@keyframes dot{0%,80%,100%{opacity:0}40%{opacity:1}}.thm-btn{position:fixed;top:12px;right:12px;background:none;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:1.2rem;padding:6px 12px;color:var(--text);z-index:100}
</style></head><body>
<button class="thm-btn" id="themeBtn" title="切换主题">🌓</button>
<div class="ac">
  <span class="icon">🔄</span>
  <h1>程序更新进行中</h1>
  <p>系统正在下载安装最新版本，请稍候<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span></p>
  <div class="progress-wrap"><div class="progress-bar" id="bar"></div></div>
  <div class="progress-text" id="ptxt">准备中...</div>
  <p style="margin-top:24px"><span class="pulse"></span>更新完成后本页将自动跳转至首页</p>
</div>
<script>
function $(id){return document.getElementById(id)}
function gd(d){return(d&&d.data!==undefined)?d.data:d}

var theme=localStorage.getItem('sonovel-theme')||'light';document.documentElement.setAttribute('data-theme',theme);
$('themeBtn').addEventListener('click',function(){theme=theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('sonovel-theme',theme);this.textContent=theme==='light'?'🌙':'☀️'});if(theme==='dark')$('themeBtn').textContent='☀️';

async function poll(){
  try{
    var r=await fetch('/api/public/update-status?_='+Date.now());
    var d=gd(await r.json());
    if(!d.updating){window.location.href='/';return}
    var p=d.progress||0;
    $('bar').style.width=p+'%';
    $('ptxt').textContent='下载进度 '+p+'%';
    setTimeout(poll,3000)
  }catch(e){setTimeout(poll,5000)}
}
poll();
</script></body></html>

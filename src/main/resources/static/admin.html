<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta content="width=device-width,initial-scale=1.0" name="viewport">
<title>SoNovel - 管理后台</title><style>:root{--primary:#5d5d81;--ph:#7b7b9d;--bg:#f8f9fa;--cb:#fff;--text:#333;--ts:#666;--border:#e5e5e5;--danger:#e74c3c;--ok:#27ae60;--blue:#409eff}[data-theme="dark"]{--bg:#1a1a2e;--cb:#16213e;--text:#e0e0e0;--ts:#a0a0a0;--border:#2a2a4a;--primary:#8b8bb0;--ph:#a0a0c0;--danger:#ff6b6b;--ok:#51cf66;--blue:#6cb2ff}*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);transition:background .3s}
.hd{background:var(--cb);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.hd h1{font-size:1.2rem;color:var(--primary)}.ha{display:flex;gap:8px;align-items:center}
.ha .btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--cb);cursor:pointer;font-size:.8rem;color:var(--text);text-decoration:none;transition:all .2s}.ha .btn:hover{border-color:var(--primary);color:var(--primary)}.ha .btn-d{color:var(--danger);border-color:var(--danger)}.ha .btn-d:hover{background:var(--danger);color:#fff}
.container{max-width:1200px;margin:16px auto;padding:0 24px}.card{background:var(--cb);border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.06);padding:20px;margin-bottom:16px}.card h2{font-size:1rem;margin-bottom:12px;color:var(--primary);border-left:3px solid var(--primary);padding-left:10px}
table{width:100%;border-collapse:collapse}th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border);font-size:.85rem}th{background:var(--bg);color:var(--ts);font-weight:600}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:.75rem}.badge-a{background:#f0f9eb;color:#529b2e}.badge-u{background:var(--bg);color:var(--ts)}.badge-b{background:#fef0f0;color:var(--danger)}.badge-g{background:#f0f9eb;color:var(--ok)}.badge-p{background:#fef6e4;color:#e6a23c}
.abtn{padding:4px 10px;border:none;border-radius:6px;cursor:pointer;font-size:.8rem;transition:all .2s}.abtn-ban{background:#fef0f0;color:var(--danger)}.abtn-ban:hover{background:var(--danger);color:#fff}.abtn-ub{background:#f0f9eb;color:var(--ok)}.abtn-ub:hover{background:var(--ok);color:#fff}.abtn-ed{background:#ecf5ff;color:var(--blue)}.abtn-ed:hover{background:var(--blue);color:#fff}.abtn-del{background:#fef0f0;color:var(--danger)}.abtn-del:hover{background:var(--danger);color:#fff}
.tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}.tab{padding:8px 16px;cursor:pointer;font-size:.85rem;color:var(--ts);border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s}.tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}.tab-content{display:none}.tab-content.active{display:block}.loading{text-align:center;padding:30px;color:var(--ts)}
.btn-p{padding:6px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:.85rem;margin-bottom:10px}.btn-p:hover{background:var(--ph)}
.modal-o{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.5);align-items:center;justify-content:center}.modal-o.show{display:flex}
.modal{background:var(--cb);border-radius:16px;padding:24px;width:90%;max-width:550px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.3)}.modal h3{margin:0 0 14px;color:var(--primary)}.mclose{float:right;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ts)}.mclose:hover{color:var(--text)}
.fg{margin-bottom:12px}.fg label{display:block;margin-bottom:4px;font-size:.85rem;font-weight:500}.fg input[type="text"],.fg input[type="number"]{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;background:var(--cb);color:var(--text)}.fg input:focus{border-color:var(--primary)}
.fg textarea{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;resize:vertical;background:var(--cb);color:var(--text);min-height:80px}.fg textarea:focus{border-color:var(--primary)}
.fg select{padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;background:var(--cb);color:var(--text)}.fg .ck{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:.85rem}
.md-tb{display:flex;flex-wrap:wrap;gap:3px;padding:6px;background:var(--bg);border:1px solid var(--border);border-bottom:none;border-radius:8px 8px 0 0}.md-tb button{padding:3px 8px;border:1px solid var(--border);border-radius:4px;background:var(--cb);cursor:pointer;font-size:.75rem;color:var(--text)}.md-tb button:hover{border-color:var(--primary);color:var(--primary)}.md-ed{width:100%;min-height:160px;padding:10px;border:1px solid var(--border);border-radius:0 0 8px 8px;font-size:.85rem;font-family:'Courier New',monospace;resize:vertical;outline:none;background:var(--cb);color:var(--text)}.md-ed:focus{border-color:var(--primary)}.md-pv{padding:14px;border:1px solid var(--border);border-radius:8px;background:var(--cb);min-height:80px;line-height:1.7;font-size:.9rem}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:.85rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}
.thm-btn{background:none;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:1.2rem;padding:6px 12px;color:var(--text)}.config-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}@media(max-width:768px){.config-grid{grid-template-columns:1fr}}
/* Toggle switch */
.sw{position:relative;display:inline-block;width:48px;height:26px;flex-shrink:0}.sw input{opacity:0;width:0;height:0}.sl{position:absolute;cursor:pointer;inset:0;background:#ccc;transition:.3s;border-radius:26px}.sl:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;transition:.3s;border-radius:50%}input:checked+.sl{background:var(--ok)}input:checked+.sl:before{transform:translateX(22px)}</style></head><body>
<div class="hd"><h1>📊 管理后台</h1><div class="ha"><button class="thm-btn" id="themeBtn" title="切换主题">🌓</button><a href="/" class="btn">返回首页</a><button class="btn btn-d" id="loBtn">退出</button></div></div>
<div class="container"><div class="tabs"><div class="tab active" data-tab="ann">📢 公告</div><div class="tab" data-tab="user">👥 用户</div><div class="tab" data-tab="cfg">⚙ 配置</div><div class="tab" data-tab="maint">🔧 维护</div><div class="tab" data-tab="log">📋 日志</div><div class="tab" data-tab="banlog">🚫 封号名单</div></div>

<div class="tab-content active" id="tab-ann"><div class="card"><h2>系统公告</h2><button class="btn-p" id="addA">+ 发布公告</button><div class="loading" id="al">加载中...</div><div id="aw" style="display:none"><table><thead><tr><th>ID</th><th>标题</th><th>置顶</th><th>时间</th><th>操作</th></tr></thead><tbody id="at"></tbody></table></div></div></div>

<div class="tab-content" id="tab-user"><div class="card"><h2>用户列表</h2><div class="loading" id="ul">加载中...</div><div id="uw" style="display:none"><table><thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>时间</th><th>操作</th></tr></thead><tbody id="ut"></tbody></table></div></div></div>

<div class="tab-content" id="tab-cfg"><div class="card"><h2>系统配置</h2><div class="loading" id="cl">加载中...</div><div id="cw" style="display:none"><div class="config-grid" id="cfgGrid"></div></div></div>
<div class="card" style="margin-top:16px"><h2>🔄 更新检查</h2><div id="upInfo" style="font-size:.85rem;color:var(--ts)">加载中...</div><button class="btn-p" id="upBtn" style="margin-top:8px">手动检查更新</button> <button class="btn-p" id="upApply" style="margin-top:8px;background:var(--danger);display:none">确认更新</button></div></div>

<div class="tab-content" id="tab-maint"><div class="card"><h2>维护模式</h2>
<div style="display:flex;align-items:center;gap:16px;margin-bottom:20px">
  <label class="sw" id="maintToggleWrap"><input type="checkbox" id="maintToggle"><span class="sl"></span></label>
  <span id="maintStatus" style="font-size:.9rem;color:var(--ts)">加载中...</span>
</div>
<div style="border-top:1px solid var(--border);padding-top:16px">
  <label style="font-size:.9rem;font-weight:500;display:block;margin-bottom:8px;color:var(--text)">维护理由（Markdown）</label>
  <div class="md-tb" id="maintMtb"><button data-md="**${s}**">B</button><button data-md="*${s}*"><i>I</i></button><button data-md="# ${s}">H1</button><button data-md="## ${s}">H2</button><button data-md="### ${s}">H3</button><button data-md="[${s}](url)">🔗</button><button data-md="`${s}`">`</button><button data-md="\n\`\`\`\n${s}\n\`\`\`\n">```</button><button data-md="- ${s}">•</button><button data-md="> ${s}">❝</button><button id="maintPvBtn">👁预览</button></div>
  <textarea class="md-ed" id="maintReason" placeholder="填写维护原因，用户可在维护页面点击查看..."></textarea>
  <div class="md-pv" id="maintPv" style="display:none"></div>
  <button class="btn-p" id="saveMaintBtn" style="margin-top:10px;width:100%">💾 保存维护设置</button>
</div></div></div>

<div class="tab-content" id="tab-log"><div class="card"><h2>下载日志</h2><div class="loading" id="ll">加载中...</div><div id="lw" style="display:none"><table><thead><tr><th>书名</th><th>作者</th><th>格式</th><th>时间</th></tr></thead><tbody id="lt"></tbody></table></div></div></div>

<div class="tab-content" id="tab-banlog"><div class="card"><h2>严重违规·永久封号名单</h2><div class="loading" id="bl">加载中...</div><div id="bw" style="display:none"><div id="blist"></div></div></div></div>
</div>

<!-- Announcement modal -->
<div class="modal-o" id="am"><div class="modal"><button class="mclose" id="amc">&times;</button><h3 id="amt">发布公告</h3><input type="hidden" id="ai">
<div class="fg"><label>标题</label><input type="text" id="ati" maxlength="100"></div>
<div class="fg"><label>内容(Markdown)</label><div class="md-tb" id="mtb"><button data-md="**${s}**">B</button><button data-md="*${s}*"><i>I</i></button><button data-md="# ${s}">H1</button><button data-md="## ${s}">H2</button><button data-md="### ${s}">H3</button><button data-md="[${s}](url)">🔗</button><button data-md="`${s}`">`</button><button data-md="\n```\n${s}\n```\n">```</button><button data-md="- ${s}">•</button><button data-md="> ${s}">❝</button><button id="pvBtn">👁预览</button></div>
<textarea class="md-ed" id="aco"></textarea><div class="md-pv" id="apv" style="display:none"></div></div>
<div class="fg"><label class="ck"><input type="checkbox" id="api"> 置顶</label></div>
<button class="btn-p" id="as" style="width:100%">保存</button></div></div>

<!-- Delete user modal -->
<div class="modal-o" id="dm"><div class="modal"><button class="mclose" id="dmc">&times;</button><h3>删除用户</h3><input type="hidden" id="duid">
<div class="fg"><label>删除理由（必填）</label><textarea id="dreason" placeholder="填写删除理由..."></textarea></div>
<button class="btn-p" id="dok" style="width:100%;background:var(--danger)">确认删除</button></div></div>

<div class="toast" id="toast"></div>

<script>
function $(id){return document.getElementById(id)}function gd(d){return(d&&d.data!==undefined)?d.data:d}
function t(m,c){var el=$('toast');el.textContent=m;el.className='toast show'+(c?' '+c:'');setTimeout(function(){el.classList.remove('show')},2500)}

// Theme
var th=localStorage.getItem('sonovel-theme')||'light';document.documentElement.setAttribute('data-theme',th);
$('themeBtn').addEventListener('click',function(){th=th==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',th);localStorage.setItem('sonovel-theme',th);this.textContent=th==='light'?'🌙':'☀️'});if(th==='dark')$('themeBtn').textContent='☀️';

function md2html(tx){if(!tx)return'';var h=tx.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h=h.replace(/```([\\s\\S]*?)```/g,'<pre><code>$1</code></pre>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');h=h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*([^*]+)\*/g,'<em>$1</em>');return h}

// Check admin
async function chk(){try{var r=await fetch('/api/auth/check');var d=gd(await r.json());if(!d.authenticated||d.role!=='admin'){window.location.href='/login.html';return null}return d}catch(e){window.location.href='/login.html';return null}}

// Announcements
async function la(){try{var r=await fetch('/api/admin/announcements');var list=gd(await r.json());var t=$('at');if(!list||!list.length){t.innerHTML='<tr><td colspan="5" style="text-align:center;color:#999">暂无</td></tr>'}else{t.innerHTML=list.map(function(a){return'<tr><td>'+a.id+'</td><td>'+a.title+'</td><td>'+(a.pinned?'<span class="badge badge-p">📌</span>':'-')+'</td><td>'+new Date(a.updatedAt).toLocaleString('zh-CN')+'</td><td><button class="abtn abtn-ed" onclick="ea('+a.id+')">编辑</button> <button class="abtn abtn-del" onclick="da('+a.id+')">删除</button></td></tr>'}).join('')}$('al').style.display='none';$('aw').style.display='block'}catch(e){$('al').textContent='失败'}}
window.ea=async function(id){try{var r=await fetch('/api/announcements/detail?id='+id);var a=gd(await r.json());$('ai').value=a.id;$('ati').value=a.title;$('aco').value=a.content||'';$('api').checked=a.pinned===1;$('amt').textContent='编辑公告';$('apv').style.display='none';$('aco').style.display='';$('pvBtn').textContent='👁预览';$('am').classList.add('show')}catch(e){alert('加载失败')}};
window.da=async function(id){if(!confirm('删除?'))return;try{var r=await fetch('/api/admin/announcements?id='+id,{method:'DELETE'});if(r.ok){t('已删除');la()}}catch(e){alert('失败')}};
$('addA').addEventListener('click',function(){$('ai').value='';$('ati').value='';$('aco').value='';$('api').checked=false;$('amt').textContent='发布公告';$('apv').style.display='none';$('aco').style.display='';$('pvBtn').textContent='👁预览';$('am').classList.add('show')});
$('as').addEventListener('click',async function(){var id=$('ai').value,ti=$('ati').value.trim(),co=$('aco').value,pi=$('api').checked?1:0;if(!ti){t('标题不能为空','e');return}try{var m=id?'PUT':'POST',bd=id?{id:parseInt(id),title:ti,content:co,pinned:pi}:{title:ti,content:co,pinned:pi};var r=await fetch('/api/admin/announcements',{method:m,headers:{'Content-Type':'application/json'},body:JSON.stringify(bd)});if(r.ok){t(id?'已更新':'已发布');$('am').classList.remove('show');la()}}catch(e){alert('保存失败')}});
$('amc').addEventListener('click',function(){$('am').classList.remove('show')});
$('am').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});
$('pvBtn').addEventListener('click',function(){var p=$('apv'),e=$('aco');if(p.style.display==='none'){p.innerHTML=md2html(e.value);p.style.display='block';e.style.display='none';this.textContent='✏编辑'}else{p.style.display='none';e.style.display='';this.textContent='👁预览'}});
// MD toolbar
$('mtb').addEventListener('click',function(e){var b=e.target.closest('button[data-md]');if(!b)return;var tpl=b.dataset.md,ta=$('aco'),s=ta.selectionStart,se=ta.selectionEnd,sel=ta.value.substring(s,se)||'text',ins=tpl.replace(/\$\{s\}/g,sel);ta.value=ta.value.substring(0,s)+ins+ta.value.substring(se);ta.focus();ta.setSelectionRange(s+ins.indexOf(sel)+sel.length,s+ins.indexOf(sel)+sel.length)});

// Users
async function lu(){try{var r=await fetch('/api/admin/users');var list=gd(await r.json());var t=$('ut');if(!list||!list.length){t.innerHTML='<tr><td colspan="6" style="text-align:center;color:#999">暂无</td></tr>'}else{t.innerHTML=list.map(function(u){return'<tr><td>'+u.id+'</td><td>'+u.username+'</td><td><span class="badge '+(u.role==='admin'?'badge-a':'badge-u')+'">'+(u.role==='admin'?'管理员':'用户')+'</span></td><td><span class="badge '+(u.banned?'badge-b':'badge-g')+'">'+(u.banned?'已封禁':'正常')+'</span></td><td>'+new Date(u.createdAt).toLocaleString('zh-CN')+'</td><td>'+(u.role!=='admin'?('<button class="abtn '+(u.banned?'abtn-ub':'abtn-ban')+'" onclick="tb('+u.id+','+(u.banned?0:1)+')">'+(u.banned?'解封':'封禁')+'</button> <button class="abtn abtn-del" onclick="delU('+u.id+',\''+u.username+'\')">删除</button>'):'<span style="color:#999">-</span>')+'</td></tr>'}).join('')}$('ul').style.display='none';$('uw').style.display='block'}catch(e){$('ul').textContent='失败'}}
window.tb=async function(id,b){if(b&&!confirm('封禁?'))return;try{var r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:id,action:b?'ban':'unban'})});if(r.ok){t(b?'已封禁':'已解封');lu()}}catch(e){alert('错误')}};
window.delU=function(id,name){$('duid').value=id;$('dreason').value='';$('dm').classList.add('show')};
$('dok').addEventListener('click',async function(){var id=$('duid').value,reason=$('dreason').value.trim();if(!reason){t('必须填写删除理由','e');return}try{var r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:parseInt(id),action:'delete',reason:reason})});if(r.ok){t('已删除');$('dm').classList.remove('show');lu();lbl()}}catch(e){alert('失败')}});
$('dmc').addEventListener('click',function(){$('dm').classList.remove('show')});
$('dm').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show')});

// Config
async function lcfg(){try{var r=await fetch('/api/admin/config');var cfg=gd(await r.json());var html='';
var labels={contact_info:'管理员联系方式\n(封禁/删除时显示给用户)',api_search_rate:'API搜索速率\n(次数/秒)',api_download_rate:'API下载速率\n(次数/秒)',web_search_rate:'Web搜索速率\n(次数/秒)',web_download_rate:'Web下载速率\n(次数/秒)',web_visit_rate:'Web访问速率\n(次数/秒)'};
for(var k in labels){var val=cfg[k]||'';html+='<div class="fg"><label>'+labels[k].replace(/\n/g,'<br>')+'</label><div style="display:flex;gap:6px"><input type="text" value="'+val+'" data-key="'+k+'" style="flex:1"><button class="btn-p" onclick="saveCfg(\''+k+'\',this.previousElementSibling.value)" style="width:60px;margin:0;font-size:.75rem">保存</button></div></div>'}$('cfgGrid').innerHTML=html;$('cl').style.display='none';$('cw').style.display='block'}catch(e){$('cl').textContent='失败'}}
window.saveCfg=async function(k,v){try{var r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'config',key:k,value:v})});if(r.ok)t('已保存')}catch(e){alert('失败')}};

// Update check
var upHasUpdate=false;
async function checkUpd(){
  try{var r=await fetch('/api/admin/update');var d=gd(await r.json());var el=$('upInfo');
  if(d.error){el.innerHTML='<span style="color:var(--danger)">检查失败: '+d.error+'</span>';return}
  el.innerHTML='当前: <b>'+d.currentVersion+'</b> | 最新: <b>'+d.latestVersion+'</b>'+(d.hasUpdate?'<br><span style="color:var(--danger)">🔄 有新版本！</span> <a href="'+d.url+'" target="_blank" style="color:var(--primary)">查看</a>':'  ✅ 已是最新');
  upHasUpdate=d.hasUpdate;$('upApply').style.display=d.hasUpdate?'inline-block':'none'}catch(e){$('upInfo').textContent='检查失败'}}
$('upBtn').addEventListener('click',function(){$('upInfo').textContent='检查中...';checkUpd()});
$('upApply').addEventListener('click',function(){if(!confirm('确认执行更新？服务会重启！'))return;$('upInfo').textContent='更新中...';fetch('/api/admin/update?action=apply',{method:'POST'}).then(function(r){return r.json()}).then(function(d){var dd=gd(d);$('upInfo').textContent=dd.message||'更新完成'}).catch(function(){$('upInfo').textContent='更新失败'})});

// Maintenance mode
var maintEnabled=false;
async function loadMaint(){
  try{
    var r=await fetch('/api/admin/maintenance');var d=gd(await r.json());
    maintEnabled=d.enabled;
    $('maintToggle').checked=d.enabled;
    $('maintReason').value=d.reason||'';
    $('maintStatus').textContent='维护模式: '+(d.enabled?'🟢 已开启':'🔴 已关闭');
  }catch(e){$('maintStatus').textContent='加载失败'}
}
$('maintToggle').addEventListener('change',function(){

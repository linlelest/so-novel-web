<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>SoNovel - 管理后台</title>
  <style>
    :root { --primary: #5d5d81; --primary-hover: #7b7b9d; --bg: #f8f9fa; --card-bg: #fff; --text: #333; --text-secondary: #666; --border: #e5e5e5; --danger: #e74c3c; --success: #27ae60; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif; background: var(--bg); min-height: 100vh; color: var(--text); }
    .header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 1.3rem; color: var(--primary); }
    .header-actions { display: flex; gap: 12px; align-items: center; }
    .header-actions .btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); cursor: pointer; font-size: .85rem; color: var(--text); text-decoration: none; transition: all .2s; }
    .header-actions .btn:hover { border-color: var(--primary); color: var(--primary); }
    .header-actions .btn-danger { color: var(--danger); border-color: var(--danger); }
    .header-actions .btn-danger:hover { background: var(--danger); color: #fff; }
    .container { max-width: 1200px; margin: 24px auto; padding: 0 24px; }
    .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.06); padding: 24px; margin-bottom: 24px; }
    .card h2 { font-size: 1.1rem; margin-bottom: 16px; color: var(--primary); border-left: 3px solid var(--primary); padding-left: 10px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); font-size: .9rem; }
    th { background: var(--bg); color: var(--text-secondary); font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .8rem; }
    .badge-admin { background: #f0f9eb; color: #529b2e; }
    .badge-user { background: #f0f2f5; color: #666; }
    .badge-banned { background: #fef0f0; color: #e74c3c; }
    .badge-active { background: #f0f9eb; color: #27ae60; }
    .badge-pinned { background: #fef6e4; color: #e6a23c; }
    .action-btn { padding: 4px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: .85rem; transition: all .2s; }
    .action-btn-ban { background: #fef0f0; color: #e74c3c; }
    .action-btn-ban:hover { background: #e74c3c; color: #fff; }
    .action-btn-unban { background: #f0f9eb; color: #27ae60; }
    .action-btn-unban:hover { background: #27ae60; color: #fff; }
    .action-btn-edit { background: #ecf5ff; color: #409eff; }
    .action-btn-edit:hover { background: #409eff; color: #fff; }
    .action-btn-del { background: #fef0f0; color: #e74c3c; }
    .action-btn-del:hover { background: #e74c3c; color: #fff; }
    .tabs { display: flex; gap: 0; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .tab { padding: 10px 20px; cursor: pointer; font-size: .9rem; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .tab:hover { color: var(--primary); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .loading { text-align: center; padding: 40px; color: var(--text-secondary); }
    .btn-primary { padding: 8px 20px; border: none; border-radius: 8px; background: var(--primary); color: #fff; cursor: pointer; font-size: .9rem; margin-bottom: 12px; }
    .btn-primary:hover { background: var(--primary-hover); }
    .md-toolbar { display: flex; flex-wrap: wrap; gap: 4px; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-bottom: none; border-radius: 8px 8px 0 0; }
    .md-toolbar button { padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--card-bg); cursor: pointer; font-size: .8rem; color: var(--text); transition: all .15s; }
    .md-toolbar button:hover { border-color: var(--primary); color: var(--primary); }
    .md-editor { width: 100%; min-height: 200px; padding: 12px; border: 1px solid var(--border); border-radius: 0 0 8px 8px; font-size: .9rem; font-family: 'Courier New',monospace; resize: vertical; outline: none; }
    .md-editor:focus { border-color: var(--primary); }
    .md-preview { padding: 16px; border: 1px solid var(--border); border-radius: 8px; background: var(--card-bg); min-height: 100px; line-height: 1.7; }
    .md-preview h1,.md-preview h2,.md-preview h3 { margin: 12px 0 8px; }
    .md-preview p { margin: 6px 0; }
    .md-preview code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: .85em; }
    .md-preview pre { background: #282c34; color: #abb2bf; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .md-preview pre code { background: none; padding: 0; color: #abb2bf; }
    .md-preview ul,.md-preview ol { padding-left: 24px; }
    .md-preview blockquote { border-left: 4px solid var(--primary); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
    .md-preview img { max-width: 100%; border-radius: 4px; }
    .md-preview a { color: var(--primary); }
    .modal-overlay { display: none; position: fixed; inset: 0; z-index: 2000; background: rgba(0,0,0,.5); align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--card-bg); border-radius: 16px; padding: 24px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; }
    .modal h3 { margin: 0 0 16px; color: var(--primary); }
    .modal-close { float: right; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text-secondary); }
    .modal-close:hover { color: var(--text); }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; margin-bottom: 4px; font-size: .9rem; font-weight: 500; }
    .form-group input[type="text"] { width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: .9rem; outline: none; }
    .form-group input[type="text"]:focus { border-color: var(--primary); }
    .form-group .checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: .9rem; }
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 10px 24px; border-radius: 8px; font-size: .85rem; z-index: 9999; opacity: 0; transition: opacity .3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    @media (max-width:768px) { .md-toolbar { gap: 2px; } .md-toolbar button { padding: 4px 6px; font-size: .75rem; } }
  </style>
</head>
<body>
<div class="header"><h1>📊 管理后台</h1><div class="header-actions"><a href="/" class="btn">返回首页</a><button class="btn btn-danger" id="logoutBtn">退出登录</button></div></div>
<div class="container">
  <div class="tabs">
    <div class="tab active" data-tab="announcements">📢 公告管理</div>
    <div class="tab" data-tab="users">👥 用户管理</div>
    <div class="tab" data-tab="logs">📋 下载日志</div>
  </div>

  <div class="tab-content active" id="tab-announcements">
    <div class="card"><h2>系统公告</h2><button class="btn-primary" id="addAnnounceBtn">+ 发布公告</button><div class="loading" id="aload">加载中...</div><div id="awrap" style="display:none"><table><thead><tr><th>ID</th><th>标题</th><th>置顶</th><th>更新时间</th><th>操作</th></tr></thead><tbody id="atbody"></tbody></table></div></div>
  </div>
  <div class="tab-content" id="tab-users">
    <div class="card"><h2>用户列表</h2><div class="loading" id="uload">加载中...</div><div id="uwrap" style="display:none"><table><thead><tr><th>ID</th><th>用户名</th><th>角色</th><th>状态</th><th>注册时间</th><th>操作</th></tr></thead><tbody id="utbody"></tbody></table></div></div>
  </div>
  <div class="tab-content" id="tab-logs">
    <div class="card"><h2>下载日志</h2><div class="loading" id="lload">加载中...</div><div id="lwrap" style="display:none"><table><thead><tr><th>书名</th><th>作者</th><th>格式</th><th>时间</th></tr></thead><tbody id="ltbody"></tbody></table></div></div>
  </div>
</div>

<div class="modal-overlay" id="amodal">
  <div class="modal">
    <button class="modal-close" id="amclose">&times;</button>
    <h3 id="amtitle">发布公告</h3>
    <input type="hidden" id="aid">
    <div class="form-group"><label>公告标题</label><input type="text" id="atitle" placeholder="输入公告标题" maxlength="100"></div>
    <div class="form-group"><label>内容（支持 Markdown）</label>
      <div class="md-toolbar">
        <button data-md="**${s}**" title="粗体">B</button>
        <button data-md="*${s}*" title="斜体"><i>I</i></button>
        <button data-md="# ${s}" title="标题1">H1</button>
        <button data-md="## ${s}" title="标题2">H2</button>
        <button data-md="### ${s}" title="标题3">H3</button>
        <button data-md="[${s}](url)" title="链接">🔗</button>
        <button data-md="![](${s})" title="图片">🖼</button>
        <button data-md="\`${s}\`" title="行内代码">code</button>
        <button data-md="\n\`\`\`\n${s}\n\`\`\`\n" title="代码块">```</button>
        <button data-md="- ${s}" title="无序列表">•</button>
        <button data-md="1. ${s}" title="有序列表">1.</button>
        <button data-md="> ${s}" title="引用">❝</button>
        <button data-md="---" title="分隔线">—</button>
        <button id="pvwBtn">👁 预览</button>
      </div>
      <textarea class="md-editor" id="acontent" placeholder="输入公告内容（Markdown）"></textarea>
      <div class="md-preview" id="apreview" style="display:none"></div>
    </div>
    <div class="form-group"><label class="checkbox-label"><input type="checkbox" id="apinned"> 置顶</label></div>
    <button class="btn-primary" id="asave" style="width:100%">保存</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  function toast(m) { var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
  function $(id) { return document.getElementById(id); }
  function getData(d) { return (d&&d.data!==undefined)?d.data:d; }

  // MD parser
  function md2html(t) {
    if(!t)return'';var h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    h=h.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');
    h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');
    h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');
    h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');
    h=h.replace(/^- (.+)$/gm,'<li>$1</li>');
    h=h.replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>');
    h=h.replace(/`([^`]+)`/g,'<code>$1</code>');
    h=h.replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">');
    h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
    h=h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
    h=h.replace(/\*([^*]+)\*/g,'<em>$1</em>');
    h=h.replace(/^---$/gm,'<hr>');
    return h;
  }

  // MD toolbar
  document.querySelector('.md-toolbar').addEventListener('click',function(e){
    var b=e.target.closest('button[data-md]'); if(!b)return;
    var tpl=b.dataset.md, ta=$('acontent'), s=ta.selectionStart, se=ta.selectionEnd;
    var sel=ta.value.substring(s,se)||'text', ins=tpl.replace(/\$\{s\}/g,sel);
    ta.value=ta.value.substring(0,s)+ins+ta.value.substring(se); ta.focus();
    var c=s+ins.indexOf(sel)+sel.length; ta.setSelectionRange(c,c);
  });

  // preview toggle
  $('pvwBtn').addEventListener('click',function(){
    var p=$('apreview'), e=$('acontent');
    if(p.style.display==='none'){p.innerHTML=md2html(e.value);p.style.display='block';e.style.display='none';this.textContent='✏ 编辑';}
    else{p.style.display='none';e.style.display='';this.textContent='👁 预览';}
  });

  // Check session
  async function check(){
    try{
      var r=await fetch('/api/auth/check'); var d=await r.json(); var info=getData(d);
      if(!info.authenticated || info.role!=='admin'){window.location.href='/login.html';return null;}
      return info;
    }catch(e){window.location.href='/login.html';return null;}
  }

  // --- Announcements ---
  async function loadA(){
    try{
      var r=await fetch('/api/admin/announcements'); var d=await r.json(); var list=getData(d);
      var t=$('atbody');
      if(!list||!list.length){t.innerHTML='<tr><td colspan="5" style="text-align:center;color:#999">暂无公告</td></tr>';}
      else{t.innerHTML=list.map(function(a){return'<tr><td>'+a.id+'</td><td>'+a.title+'</td><td>'+(a.pinned?'<span class="badge badge-pinned">📌</span>':'-')+'</td><td>'+new Date(a.updatedAt).toLocaleString('zh-CN')+'</td><td><button class="action-btn action-btn-edit" onclick="editA('+a.id+')">编辑</button> <button class="action-btn action-btn-del" onclick="delA('+a.id+')">删除</button></td></tr>';}).join('');}
      $('aload').style.display='none';$('awrap').style.display='block';
    }catch(e){$('aload').textContent='加载失败';}
  }

  window.editA=async function(id){
    try{
      var r=await fetch('/api/announcements/detail?id='+id); var d=await r.json(); var a=getData(d);
      $('aid').value=a.id;$('atitle').value=a.title;$('acontent').value=a.content||'';
      $('apinned').checked=a.pinned===1;$('amtitle').textContent='编辑公告';
      $('apreview').style.display='none';$('acontent').style.display='';$('pvwBtn').textContent='👁 预览';
      $('amodal').classList.add('show');
    }catch(e){alert('加载失败');}
  };

  window.delA=async function(id){
    if(!confirm('确定删除？'))return;
    try{var r=await fetch('/api/admin/announcements?id='+id,{method:'DELETE'}); if(r.ok){toast('已删除');loadA();}}catch(e){alert('删除失败');}
  };

  $('addAnnounceBtn').addEventListener('click',function(){
    $('aid').value='';$('atitle').value='';$('acontent').value='';$('apinned').checked=false;
    $('amtitle').textContent='发布公告';$('apreview').style.display='none';$('acontent').style.display='';
    $('pvwBtn').textContent='👁 预览';$('amodal').classList.add('show');
  });

  $('asave').addEventListener('click',async function(){
    var id=$('aid').value, title=$('atitle').value.trim(), content=$('acontent').value, pinned=$('apinned').checked?1:0;
    if(!title){alert('标题不能为空');return;}
    try{
      var method=id?'PUT':'POST', body=id?{id:parseInt(id),title:title,content:content,pinned:pinned}:{title:title,content:content,pinned:pinned};
      var r=await fetch('/api/admin/announcements',{method:method,headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(r.ok){toast(id?'已更新':'已发布');$('amodal').classList.remove('show');loadA();}
    }catch(e){alert('保存失败');}
  });

  $('amclose').addEventListener('click',function(){$('amodal').classList.remove('show')});
  $('amodal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});

  // --- Users ---
  async function loadU(){
    try{
      var r=await fetch('/api/admin/users'); var d=await r.json(); var list=getData(d);
      var t=$('utbody');
      if(!list||!list.length){t.innerHTML='<tr><td colspan="6" style="text-align:center;color:#999">暂无用户</td></tr>';}
      else{t.innerHTML=list.map(function(u){return'<tr><td>'+u.id+'</td><td>'+u.username+'</td><td><span class="badge '+(u.role==='admin'?'badge-admin':'badge-user')+'">'+(u.role==='admin'?'管理员':'用户')+'</span></td><td><span class="badge '+(u.banned?'badge-banned':'badge-active')+'">'+(u.banned?'已封禁':'正常')+'</span></td><td>'+new Date(u.createdAt).toLocaleString('zh-CN')+'</td><td>'+(u.role!=='admin'?'<button class="action-btn '+(u.banned?'action-btn-unban':'action-btn-ban')+'" onclick="toggleB('+u.id+','+(u.banned?0:1)+')">'+(u.banned?'解封':'封禁')+'</button>':'<span style="color:#999">-</span>')+'</td></tr>';}).join('');}
      $('uload').style.display='none';$('uwrap').style.display='block';
    }catch(e){$('uload').textContent='加载失败';}
  }
  window.toggleB=async function(id,b){if(b&&!confirm('确定封禁？'))return;try{var r=await fetch('/api/admin/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:id,action:b?'ban':'unban'})});if(r.ok)loadU();}catch(e){alert('网络错误');}};

  // --- Logs ---
  async function loadL(){
    try{
      var r=await fetch('/api/admin/logs'); var d=await r.json(); var list=getData(d);
      var t=$('ltbody');
      if(!list||!list.length){t.innerHTML='<tr><td colspan="4" style="text-align:center;color:#999">暂无记录</td></tr>';}
      else{t.innerHTML=list.map(function(l){return'<tr><td>'+l.bookName+'</td><td>'+l.author+'</td><td>'+(l.format||'').toUpperCase()+'</td><td>'+new Date(l.createdAt).toLocaleString('zh-CN')+'</td></tr>';}).join('');}
      $('lload').style.display='none';$('lwrap').style.display='block';
    }catch(e){$('lload').textContent='加载失败';}
  }

  $('logoutBtn').addEventListener('click',async function(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login.html';});

  document.querySelectorAll('.tab').forEach(function(t){
    t.addEventListener('click',function(){
      document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
      document.querySelectorAll('.tab-content').forEach(function(x){x.classList.remove('active');});
      this.classList.add('active');$('tab-'+this.dataset.tab).classList.add('active');
    });
  });

  check().then(function(s){if(s){loadA();loadU();loadL();}});
</script>
</body>
</html>

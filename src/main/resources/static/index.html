<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1" name="viewport">
  <meta content="yes" name="mobile-web-app-capable">
  <meta content="yes" name="apple-mobile-web-app-capable">
  <meta content="telephone=no" name="format-detection">
  <title>SoNovel WebUI</title>
  <link href="favicon.ico" rel="icon" type="image/x-icon">
  <link rel="stylesheet" href="/index.css">
  <style>
    .user-info { font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px; }
    .user-info .username { font-weight: 600; color: var(--primary); }
    .header-right { position: absolute; right: 0; top: 50%; transform: translateY(-50%); display: flex; align-items: center; gap: 8px; }
    .btn-header {
      padding: 6px 12px; font-size: 0.8rem; background: none; border: 1px solid var(--border);
      border-radius: 6px; cursor: pointer; color: var(--text-secondary); transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-header:hover { color: var(--primary); border-color: var(--primary); background: rgba(93,93,129,0.05); }
    .btn-header-danger { color: #e74c3c; }
    .btn-header-danger:hover { border-color: #e74c3c; color: #e74c3c; background: #fef0f0; }
    .modal-overlay {
      display: none; position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.5); align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--card-bg); border-radius: 16px; padding: 32px; width: 90%; max-width: 600px;
      max-height: 80vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    }
    .modal h2 { margin: 0 0 20px 0; color: var(--primary); font-size: 1.3rem; }
    .modal-close {
      float: right; background: none; border: none; font-size: 1.5rem;
      cursor: pointer; color: var(--text-secondary); padding: 0; line-height: 1;
    }
    .modal-close:hover { color: var(--text); }
    .token-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px;
      gap: 12px; flex-wrap: wrap;
    }
    .token-item .token-value {
      font-family: 'Courier New', monospace; font-size: 0.8rem;
      word-break: break-all; flex: 1; min-width: 120px;
      background: var(--bg); padding: 4px 8px; border-radius: 4px;
    }
    .token-item .token-note { font-size: 0.85rem; color: var(--text-secondary); flex: 1; min-width: 80px; }
    .token-item .token-actions { display: flex; gap: 6px; }
    .token-item .token-actions button {
      padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px;
      font-size: 0.8rem; cursor: pointer; background: var(--card-bg); transition: all 0.2s;
    }
    .token-item .token-actions .copy-btn { color: var(--primary); }
    .token-item .token-actions .copy-btn:hover { background: var(--primary); color: #fff; }
    .token-item .token-actions .edit-btn { color: var(--text-secondary); }
    .token-item .token-actions .edit-btn:hover { border-color: var(--primary); color: var(--primary); }
    .token-item .token-actions .del-btn { color: #e74c3c; }
    .token-item .token-actions .del-btn:hover { background: #e74c3c; color: #fff; }
    .token-empty { text-align: center; color: var(--text-secondary); padding: 24px; font-size: 0.9rem; }
    .create-token-form {
      display: flex; gap: 8px; margin-bottom: 16px; align-items: center;
    }
    .create-token-form input {
      flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
      font-size: 0.9rem; outline: none;
    }
    .create-token-form input:focus { border-color: var(--primary); }
    .create-token-form button {
      padding: 10px 20px; border: none; border-radius: 8px; background: var(--primary);
      color: #fff; font-size: 0.9rem; cursor: pointer; white-space: nowrap;
    }
    .create-token-form button:hover { background: var(--primary-hover); }
    .token-full-url {
      font-size: 0.8rem; background: var(--bg); padding: 6px 10px; border-radius: 6px;
      word-break: break-all; margin-top: 4px; cursor: pointer; border: 1px dashed var(--border);
      transition: all 0.2s;
    }
    .token-full-url:hover { border-color: var(--primary); background: #f0f2f5; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 24px; border-radius: 8px;
      font-size: 0.85rem; z-index: 9999; opacity: 0; transition: opacity 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .edit-note-input {
      padding: 4px 8px; border: 1px solid var(--primary); border-radius: 4px;
      font-size: 0.85rem; width: 120px; outline: none;
    }
    .edit-note-save {
      padding: 4px 10px; border: none; border-radius: 4px; background: var(--primary);
      color: #fff; font-size: 0.75rem; cursor: pointer;
    }
    @media (max-width: 768px) {
      .header-right { position: static; transform: none; margin-top: 8px; justify-content: center; flex-wrap: wrap; }
      .create-token-form { flex-direction: column; }
      .create-token-form button { width: 100%; }
    }
  </style>
</head>
<body>
<div class="wrap-container">
  <header class="header">
    <h1 class="app-title">SO NOVEL</h1>
    <a id="versionTag" class="version-tag" target="_blank">version</a>
    <button class="btn-settings" id="settingsToggle">设置</button>
    <div class="header-right">
      <span class="user-info" id="userInfo">
        <span class="username" id="displayUsername"></span>
        <span id="displayRole"></span>
      </span>
      <button class="btn-header" id="tokenBtn">🔑 获取 Token</button>
      <a href="/admin.html" class="btn-header" id="adminLink" style="display:none">管理后台</a>
      <button class="btn-header btn-header-danger" id="logoutBtn">退出</button>
    </div>
  </header>

  <section class="container settings-container" id="settingsPanel" style="display:none">
    <h2 class="section-title">偏好设置</h2>
    <p class="settings-hint">以下设置仅保存在浏览器本地，不会修改服务器配置。</p>
    <div class="settings-grid">
      <div class="settings-item">
        <label for="settingFormat">下载格式</label>
        <select id="settingFormat">
          <option value="">跟随服务器配置</option>
          <option value="epub">EPUB</option>
          <option value="txt">TXT</option>
          <option value="html">HTML</option>
          <option value="pdf">PDF</option>
        </select>
      </div>
      <div class="settings-item">
        <label for="settingLanguage">书籍内容语言</label>
        <select id="settingLanguage">
          <option value="">自动</option>
          <option value="zh_CN">简体中文</option>
          <option value="zh_TW">繁体中文(台湾)</option>
          <option value="zh_Hant">繁体中文</option>
        </select>
      </div>
      <div class="settings-item">
        <label for="settingSearchLimit">每页显示数量</label>
        <input type="number" id="settingSearchLimit" min="10" placeholder="默认">
      </div>
      <div class="settings-item">
        <label for="settingConcurrency">下载并发限制</label>
        <input type="number" id="settingConcurrency" min="1" placeholder="默认">
      </div>
    </div>
  </section>

  <main class="main-content">
    <!-- 公告区域 -->
    <section class="container" id="announcementSection" style="display:none">
      <h2 class="section-title">📢 系统公告</h2>
      <div id="announcementList"></div>
    </section>

    <section class="container download-container" id="downloadContainer">
      <h2 class="section-title">搜索书籍</h2>
      <div class="search-container">
        <input id="downloadSearchName" placeholder="请输入书名或作者，尽量输完整" aria-label="搜索书名或作者">
        <button class="btn btn-primary btn-search" id="searchButton">搜索</button>
      </div>
      <div class="body-container" id="tb1">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
            <tr>
              <th scope="col">No</th>
              <th scope="col">书名</th>
              <th scope="col">作者</th>
              <th scope="col">最新章节</th>
              <th scope="col">最后更新</th>
              <th scope="col">书源</th>
              <th scope="col">操作</th>
              <th scope="col">源站</th>
            </tr>
            </thead>
            <tbody id="downloadTableBody">
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="container result-container">
      <div class="section-header">
        <h2 class="section-title">已下书籍</h2>
        <button class="btn btn-primary" id="refreshList">刷新</button>
      </div>
      <div class="body-container" id="tb2">
        <div class="table-responsive">
          <table class="data-table">
            <thead>
            <tr>
              <th scope="col">文件名</th>
              <th scope="col">文件大小</th>
              <th scope="col">下载时间</th>
              <th scope="col">操作</th>
            </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
          </table>
        </div>
      </div>
    </section>
  </main>
</div>

<div class="modal-overlay" id="tokenModal">
  <div class="modal">
    <button class="modal-close" id="tokenModalClose">&times;</button>
    <h2>🔑 API Token 管理</h2>
    <p style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:16px">
      使用 Token 可以在第三方程序或脚本中访问本服务的 API。<br>
      连接格式：<code style="background:var(--bg);padding:2px 6px;border-radius:4px">http://服务器地址/?token=你的Token</code>
    </p>
    <div class="create-token-form">
      <input type="text" id="newTokenNote" placeholder="输入备注（如：我的下载脚本）" maxlength="50">
      <button id="createTokenBtn">创建 Token</button>
    </div>
    <div id="tokenList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="loading-container" id="tipEle">
  <div class="content">
    <svg class="loading-icon" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="45" fill="none" stroke="#fff" stroke-width="8" stroke-dasharray="141.37 87.96" stroke-linecap="round"></circle>
    </svg>
    <span class="text" id="tipText">正在下载</span>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', () => {
    let currentUser = null;

    function getData(d) { return (d && d.data !== undefined) ? d.data : d; }

    async function checkAuth() {
      try {
        const resp = await fetch('/api/auth/check');
        const body = await resp.json();
        const data = getData(body);
        currentUser = data;
        document.getElementById('displayUsername').textContent = data.username;
        document.getElementById('displayRole').textContent = data.role === 'admin' ? '(管理员)' : '';
        if (data.role === 'admin') document.getElementById('adminLink').style.display = 'inline-block';
        return data;
      } catch (e) { window.location.href = '/login.html'; return null; }
    }

    const downloadContainer = document.getElementById('downloadContainer')
    const downloadSearchName = document.getElementById('downloadSearchName')
    const searchButton = document.getElementById('searchButton')
    const refreshListButton = document.getElementById('refreshList')
    const downloadTableBody = document.getElementById('downloadTableBody')
    const tableBody = document.getElementById('tableBody')
    const tipEle = document.getElementById('tipEle')
    const tipText = document.getElementById('tipText')
    const versionTag = document.getElementById("versionTag");
    const tb1 = document.getElementById('tb1');
    const tb2 = document.getElementById('tb2');

    let bookCache = []
    let currentPage = 1
    let latestFileName = ''

    const settingsToggle = document.getElementById('settingsToggle')
    const settingsPanel = document.getElementById('settingsPanel')
    const settingFormat = document.getElementById('settingFormat')
    const settingLanguage = document.getElementById('settingLanguage')
    const settingSearchLimit = document.getElementById('settingSearchLimit')
    const settingConcurrency = document.getElementById('settingConcurrency')

    const SETTINGS_KEY = 'sonovel-settings'
    let serverConfig = { searchLimit: -1, concurrency: -1 }

    const loadSettings = () => {
      try {
        const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}')
        settingFormat.value = saved.format || ''
        settingLanguage.value = saved.language || ''
        settingSearchLimit.value = saved.searchLimit || ''
        settingConcurrency.value = saved.concurrency || ''
      } catch (_) {}
    }

    const saveSettings = () => {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        format: settingFormat.value, language: settingLanguage.value,
        searchLimit: settingSearchLimit.value, concurrency: settingConcurrency.value,
      }))
    }

    const clampSetting = (input, configVal, fallbackMax, min = 1) => {
      const max = configVal > 0 ? configVal : fallbackMax
      input.min = min; input.max = max
      input.addEventListener('change', () => {
        const v = parseInt(input.value)
        if (v > max) input.value = max
        if (v < min && input.value !== '') input.value = min
        saveSettings()
      })
    }

    const fetchConfig = async () => {
      try {
        const resp = await fetch('/config')
        const body = await resp.json()
        const data = getData(body);
        if (data) {
          serverConfig = data
          clampSetting(settingSearchLimit, -1, 100, 10)
          clampSetting(settingConcurrency, data.concurrency, 50)
          versionTag.innerText = data.version || ''
          versionTag.href = `https://github.com/linlelest/so-novel-web/releases/tag/v${data.version}`
        }
      } catch (_) {
        clampSetting(settingSearchLimit, -1, 100, 10)
        clampSetting(settingConcurrency, -1, 50)
      }
    }

    const updateDefaultFormatLabels = () => {
      const defaultExt = settingFormat.value ? settingFormat.value.toUpperCase() : (serverConfig.extName || 'EPUB').toUpperCase()
      document.querySelectorAll('.dropdown-item.default-format').forEach(el => { el.textContent = `${defaultExt} (默认)` })
    }

    settingsToggle.addEventListener('click', () => { settingsPanel.style.display = settingsPanel.style.display === 'none' ? '' : 'none' })
    settingFormat.addEventListener('change', () => { saveSettings(); updateDefaultFormatLabels() })
    settingLanguage.addEventListener('change', saveSettings)
    settingSearchLimit.addEventListener('change', () => { if (bookCache.length > 0) { currentPage = 1; renderDownloadTable() } })

    const showTip = (text = '正在加载...') => { tipText.innerHTML = text; tipEle.style.display = 'flex' }
    const updateTip = (text) => { tipText.innerHTML = text }
    const hideTip = () => { tipEle.style.display = 'none' }

    const formatSize = (bytes) => {
      if (bytes === 0) return '0.00 B'
      const k = 1024; const sizes = ['B', 'KB', 'MB', 'GB']
      return `${(bytes / Math.pow(k, Math.floor(Math.log(bytes) / Math.log(k)))).toFixed(2)} ${sizes[Math.floor(Math.log(bytes) / Math.log(k))]}`
    }

    const formatDate = (ts) => new Date(ts).toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit' })

    const handleDownloadFileToLocal = (name) => { window.open(`${location.origin}/book-download?filename=${encodeURIComponent(name)}`, '_blank') }

    const handleDownloadToServer = async (index, format) => {
      const item = bookCache[index]
      if (!item) { alert('参数错误，请重新搜索'); return }
      showTip(`正在解析目录...`)
      const params = new URLSearchParams(item)
      const finalFormat = format || settingFormat.value || ''
      if (finalFormat) params.set('format', finalFormat)
      if (settingLanguage.value) params.set('language', settingLanguage.value)
      if (settingConcurrency.value) params.set('concurrency', settingConcurrency.value)
      try {
        const resp = await fetch(`/book-fetch?${params.toString()}`)
        if (!resp.ok) { const d = await resp.json(); throw new Error(d.message || '未知错误') }
        await fetchLocalBooks()
        location.href = `/book-download?filename=${latestFileName}`
      } catch (error) { alert(`下载书籍到服务器失败: ${error.message}`) }
      finally { hideTip() }
    }

    const getPageSize = () => { const v = parseInt(settingSearchLimit.value); return v > 0 ? v : 20 }

    const renderDownloadTable = (data) => {
      if (data !== undefined) bookCache = data
      const pageSize = getPageSize()
      const totalPages = Math.max(1, Math.ceil(bookCache.length / pageSize))
      if (currentPage > totalPages) currentPage = totalPages
      if (currentPage < 1) currentPage = 1
      const start = (currentPage - 1) * pageSize
      const end = Math.min(start + pageSize, bookCache.length)
      const pageData = bookCache.slice(start, end)
      const defaultExt = settingFormat.value ? settingFormat.value.toUpperCase() : (serverConfig.extName || 'EPUB').toUpperCase()

      downloadTableBody.innerHTML = pageData.map((item, i) => {
        const index = start + i
        return `<tr>
          <td data-label="No">${index + 1}</td>
          <td data-label="书名">${item.bookName}</td>
          <td data-label="作者">${item.author}</td>
          <td data-label="最新章节">${item.latestChapter || ''}</td>
          <td data-label="最后更新">${item.lastUpdateTime || ''}</td>
          <td data-label="书源">${item.sourceName}</td>
          <td data-label="操作">
            <div class="download-action">
              <button class="dropdown-toggle" data-index="${index}">下载为 <span class="dropdown-arrow">▾</span></button>
              <div class="dropdown-menu">
                <div class="dropdown-item default-format" data-format="" data-index="${index}">${defaultExt} (默认)</div>
                <div class="dropdown-item" data-format="epub" data-index="${index}">EPUB</div>
                <div class="dropdown-item" data-format="txt" data-index="${index}">TXT</div>
                <div class="dropdown-item" data-format="html" data-index="${index}">HTML</div>
                <div class="dropdown-item" data-format="pdf" data-index="${index}">PDF</div>
              </div>
            </div>
          </td>
          <td data-label="源站"><a href="${item.url}" target="_blank"><button class="btn btn-secondary btn-download">前往</button></a></td>
        </tr>`
      }).join('')

      renderPagination(totalPages)
      if (bookCache.length > 0) tb1.style.display = ''
    }

    const renderPagination = (totalPages) => {
      let paginationEl = document.getElementById('pagination')
      if (totalPages <= 1) { if (paginationEl) paginationEl.remove(); return }
      if (!paginationEl) {
        paginationEl = document.createElement('div'); paginationEl.id = 'pagination'; paginationEl.className = 'pagination'; tb1.appendChild(paginationEl)
      }
      let html = `<span class="pagination-info">共 ${bookCache.length} 条，第 ${currentPage}/${totalPages} 页</span><div class="pagination-btns">`
      html += `<button class="page-btn" data-page="prev" ${currentPage <= 1 ? 'disabled' : ''}>上一页</button>`
      const maxVisible = 5
      let startPage = Math.max(1, currentPage - Math.floor(maxVisible / 2))
      let endPage = Math.min(totalPages, startPage + maxVisible - 1)
      if (endPage - startPage < maxVisible - 1) startPage = Math.max(1, endPage - maxVisible + 1)
      if (startPage > 1) {
        html += `<button class="page-btn" data-page="1">1</button>`
        if (startPage > 2) html += `<span class="page-ellipsis">…</span>`
      }
      for (let i = startPage; i <= endPage; i++) html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`
      if (endPage < totalPages) {
        if (endPage < totalPages - 1) html += `<span class="page-ellipsis">…</span>`
        html += `<button class="page-btn" data-page="${totalPages}">${totalPages}</button>`
      }
      html += `<button class="page-btn" data-page="next" ${currentPage >= totalPages ? 'disabled' : ''}>下一页</button></div>`
      paginationEl.innerHTML = html
    }

    const renderLocalBooksTable = (data) => {
      tableBody.innerHTML = data.map(item => `<tr>
        <td data-label="文件名">${item.name}</td>
        <td data-label="文件大小">${formatSize(item.size)}</td>
        <td data-label="下载时间">${formatDate(item.timestamp)}</td>
        <td data-label="操作"><button class="btn btn-secondary btn-download" data-filename="${item.name}">下载</button></td>
      </tr>`).join('')
      if (data.length > 0) tb2.style.display = ''
    }

    const fetchLocalBooks = async () => {
      showTip('正在刷新...')
      try {
        const response = await fetch('/local-books')
        const body = await response.json()
        const data = getData(body);
        if (data && data.length) {
          data.sort((a, b) => b.timestamp - a.timestamp)
          if (data[0]) latestFileName = data[0].name
          renderLocalBooksTable(data)
        }
      } catch (error) { alert(`刷新已下书籍失败: ${error.message}`) }
      finally { hideTip() }
    }

    const aggregatedSearch = async () => {
      const value = downloadSearchName.value.trim()
      if (!value) { alert("请输入书名或作者！"); return }
      showTip('正在搜索...')
      searchButton.disabled = true; downloadSearchName.disabled = true
      try {
        const resp = await fetch(`/search/aggregated?kw=${encodeURIComponent(value)}`)
        const body = await resp.json()
        const data = getData(body);
        if (data && data.length) { currentPage = 1; renderDownloadTable(data) }
      } catch (error) { alert(`搜索失败: ${error.message}`) }
      finally { hideTip(); downloadContainer.classList.add('expanded'); searchButton.disabled = false; downloadSearchName.disabled = false }
    }

    const initSSE = () => {
      const es = new EventSource("/download-progress")
      es.onopen = () => console.log("SSE connected")
      es.onmessage = (e) => {
        try { const d = JSON.parse(e.data); if (d.type === "download-progress") updateTip(`${d.index} / ${d.total}`) } catch (_) {}
      }
    }

    // Token Management
    const tokenModal = document.getElementById('tokenModal')
    const tokenModalClose = document.getElementById('tokenModalClose')
    const tokenBtn = document.getElementById('tokenBtn')
    const tokenList = document.getElementById('tokenList')
    const createTokenBtn = document.getElementById('createTokenBtn')
    const newTokenNote = document.getElementById('newTokenNote')
    const toast = document.getElementById('toast')

    function showToast(msg) { toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2000) }

    async function loadTokens() {
      try {
        const resp = await fetch('/api/tokens');
        const body = await resp.json();
        const tokens = getData(body) || [];
        const baseUrl = location.origin
        if (tokens.length === 0) { tokenList.innerHTML = '<div class="token-empty">暂无 Token，创建一个开始使用吧</div>'; return }
        tokenList.innerHTML = tokens.map(t => {
          const fullUrl = `${baseUrl}/?token=${t.token}`
          return `<div class="token-item" data-id="${t.id}">
            <div style="flex:2;min-width:150px">
              <div class="token-value">${t.token}</div>
              <div class="token-full-url" onclick="navigator.clipboard.writeText('${fullUrl}').then(()=>showToast('完整链接已复制'))">${fullUrl} 📋</div>
            </div>
            <div class="token-note" id="noteDisplay-${t.id}">${t.note || '无备注'}</div>
            <div class="token-note" id="noteEdit-${t.id}" style="display:none">
              <input class="edit-note-input" type="text" value="${t.note || ''}" id="noteInput-${t.id}" maxlength="50">
              <button class="edit-note-save" onclick="window.saveNote(${t.id})">保存</button>
            </div>
            <div class="token-actions">
              <button class="copy-btn" onclick="window.copyToken('${t.token}')">复制</button>
              <button class="edit-btn" onclick="window.toggleEditNote(${t.id})">备注</button>
              <button class="del-btn" onclick="window.deleteToken(${t.id})">删除</button>
            </div>
          </div>`
        }).join('')
      } catch (e) { console.error(e) }
    }

    window.copyToken = (token) => { navigator.clipboard.writeText(token).then(() => showToast('Token 已复制')) }
    window.toggleEditNote = (id) => { document.getElementById('noteDisplay-' + id).style.display = 'none'; document.getElementById('noteEdit-' + id).style.display = 'block' }

    window.saveNote = async (id) => {
      const note = document.getElementById('noteInput-' + id).value
      try {
        const resp = await fetch('/api/tokens', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ id, note }) })
        const body = await resp.json();
        if (resp.ok && body.code === 200) { showToast('备注已更新'); loadTokens() }
        else { alert(body.message || '更新失败') }
      } catch (e) { alert('更新失败') }
    }

    window.deleteToken = async (id) => {
      if (!confirm('确定删除此 Token？')) return
      try {
        const resp = await fetch(`/api/tokens?id=${id}`, { method: 'DELETE' })
        const body = await resp.json();
        if (resp.ok && body.code === 200) { showToast('Token 已删除'); loadTokens() }
        else { alert(body.message || '删除失败') }
      } catch (e) { alert('删除失败') }
    }

    tokenBtn.addEventListener('click', () => { tokenModal.classList.add('show'); loadTokens() })
    tokenModalClose.addEventListener('click', () => tokenModal.classList.remove('show'))
    tokenModal.addEventListener('click', (e) => { if (e.target === tokenModal) tokenModal.classList.remove('show') })

    createTokenBtn.addEventListener('click', async () => {
      const note = newTokenNote.value.trim()
      try {
        const resp = await fetch('/api/tokens', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ note }) })
        const body = await resp.json();
        if (resp.ok && body.code === 200) { showToast('Token 创建成功！'); newTokenNote.value = ''; loadTokens() }
        else { alert(body.message || '创建失败') }
      } catch (e) { alert('网络错误') }
    })

    // Events
    searchButton.addEventListener('click', aggregatedSearch)
    refreshListButton.addEventListener('click', fetchLocalBooks)
    downloadSearchName.addEventListener('keydown', (e) => { if (e.key === 'Enter') aggregatedSearch() })

    tb1.addEventListener('click', (e) => {
      const pageBtn = e.target.closest('.page-btn')
      if (pageBtn && !pageBtn.disabled) {
        const page = pageBtn.dataset.page
        const totalPages = Math.ceil(bookCache.length / getPageSize())
        if (page === 'prev') currentPage--
        else if (page === 'next') currentPage++
        else currentPage = parseInt(page)
        currentPage = Math.max(1, Math.min(currentPage, totalPages))
        renderDownloadTable(); tb1.scrollIntoView({ behavior: 'smooth', block: 'start' })
      }
    })

    downloadTableBody.addEventListener('click', (e) => {
      const toggle = e.target.closest('.dropdown-toggle')
      if (toggle) { e.stopPropagation(); const action = toggle.closest('.download-action'); document.querySelectorAll('.download-action.open').forEach(el => { if (el !== action) el.classList.remove('open') }); action.classList.toggle('open'); return }
      const item = e.target.closest('.dropdown-item')
      if (item) { item.closest('.download-action').classList.remove('open'); handleDownloadToServer(item.dataset.index, item.dataset.format) }
    })

    document.addEventListener('click', () => { document.querySelectorAll('.download-action.open').forEach(el => el.classList.remove('open')) })
    tableBody.addEventListener('click', (e) => { const b = e.target.closest('button.btn-secondary'); if (b && b.dataset.filename) handleDownloadFileToLocal(b.dataset.filename) })

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' }); window.location.href = '/login.html'
    })

    // 公告加载
    async function loadAnnouncements() {
      try {
        const resp = await fetch('/api/announcements/list');
        const body = await resp.json();
        const list = getData(body) || [];
        if (list.length === 0) return;
        const section = document.getElementById('announcementSection');
        const container = document.getElementById('announcementList');
        section.style.display = '';
        container.innerHTML = list.map(a => `
          <div style="padding:12px 16px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;background:${a.pinned ? '#fef6e4' : 'var(--card-bg)'}">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
              ${a.pinned ? '<span style="font-size:1.1rem">📌</span>' : ''}
              <strong style="font-size:1rem">${a.title}</strong>
              <span style="font-size:0.75rem;color:var(--text-secondary);margin-left:auto">${new Date(a.updatedAt).toLocaleDateString('zh-CN')}</span>
            </div>
            <div class="announce-content" style="font-size:0.9rem;color:var(--text-secondary);line-height:1.6;display:none" data-id="${a.id}">
              加载中...
            </div>
            <button class="btn-toggle-announce" style="font-size:0.8rem;color:var(--primary);background:none;border:none;cursor:pointer;padding:4px 0" data-id="${a.id}">展开阅读</button>
          </div>
        `).join('');
        // 展开/收起
        container.addEventListener('click', async (e) => {
          const btn = e.target.closest('.btn-toggle-announce');
          if (!btn) return;
          const id = btn.dataset.id;
          const contentDiv = container.querySelector(`.announce-content[data-id="${id}"]`);
          if (contentDiv.style.display === 'none' || !contentDiv.style.display) {
            if (contentDiv.textContent === '加载中...' || contentDiv.textContent === '加载中...') {
              try {
                const r2 = await fetch('/api/announcements/detail?id=' + id);
                const body2 = await r2.json();
                const d2 = getData(body2);
                contentDiv.innerHTML = mdToHtml(d2.content || '(空)');
              } catch(e) { contentDiv.textContent = '加载失败'; }
            }
            contentDiv.style.display = 'block';
            btn.textContent = '收起';
          } else {
            contentDiv.style.display = 'none';
            btn.textContent = '展开阅读';
          }
        });
      } catch(e) { /* silent */ }
    }
    // 简易 MD 渲染
    function mdToHtml(t) { if(!t)return''; let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^- (.+)$/gm,'<li>$1</li>').replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>').replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/!\[([^\]]*)\]\(([^)]+)\)/g,'<img src="$2" alt="$1">').replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/^---$/gm,'<hr>');return'<p>'+h+'</p>'; }

    checkAuth().then(() => { initSSE(); loadSettings(); fetchConfig(); fetchLocalBooks(); loadAnnouncements(); tb1.style.display = 'none'; tb2.style.display = 'none' })
  })
</script>
</body>
</html>

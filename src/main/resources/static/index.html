<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1" name="viewport"><title>SoNovel Web</title><link href="favicon.ico" rel="icon" type="image/x-icon">
<style>:root{--primary:#5d5d81;--ph:#7b7b9d;--bg:#f8f9fa;--cb:#fff;--text:#333;--ts:#666;--border:#e5e5e5;--shadow:0 4px 12px rgba(0,0,0,.08);--r:12px;--danger:#e74c3c}[data-theme="dark"]{--bg:#1a1a2e;--cb:#16213e;--text:#e0e0e0;--ts:#a0a0a0;--border:#2a2a4a;--primary:#8b8bb0;--ph:#a0a0c0;--shadow:0 4px 12px rgba(0,0,0,.5);--danger:#ff6b6b}
*{box-sizing:border-box}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);margin:0;color:var(--text);transition:background .3s}
.wrap{display:flex;flex-direction:column;min-height:100vh;max-width:1024px;margin:0 auto;padding:16px 20px}
.hd{text-align:center;margin-bottom:24px;padding:8px;position:relative}
.hd h1{margin:0;color:var(--primary);font-size:2.5rem;letter-spacing:2px}
.hd .vtag{font-size:.7rem;color:var(--primary);background:#f0f9eb;text-decoration:none;padding:2px 8px;border-radius:6px;display:inline-block;margin:4px 0}
.hdr{position:absolute;right:0;top:50%;transform:translateY(-50%);display:flex;align-items:center;gap:6px}
.hdr .ui{font-size:.8rem;color:var(--ts);display:flex;align-items:center;gap:6px}
.hdr .un{font-weight:600;color:var(--primary)}
.hdr-btn{padding:5px 10px;font-size:.75rem;background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--ts);white-space:nowrap;transition:all .2s}
.hdr-btn:hover{color:var(--primary);border-color:var(--primary)}
.hdr-btn.d{color:var(--danger)}.hdr-btn.d:hover{border-color:var(--danger);color:var(--danger)}
.thm-btn{background:none;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:1.2rem;padding:4px 10px;color:var(--text)}
.sec{background:var(--cb);border-radius:var(--r);box-shadow:var(--shadow);padding:20px;margin-bottom:16px;transition:background .3s}
.sec h2{margin:0 0 12px;font-size:1.1rem;color:var(--primary);border-left:3px solid var(--primary);padding-left:10px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}s
.sh h2{margin:0}.search{display:flex;gap:8px;margin-bottom:12px}.search input{flex:1;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;outline:none;background:var(--cb);color:var(--text);transition:border-color .2s}.search input:focus{border-color:var(--primary)}.btn{padding:10px 20px;border:none;border-radius:8px;font-size:.9rem;cursor:pointer;transition:all .2s;color:#fff}.btn-p{background:var(--primary)}.btn-p:hover{background:var(--ph)}.btn-p:disabled{opacity:.5;cursor:default}
.sc-hint{font-size:.8rem;color:var(--ts);margin-bottom:12px}
table{width:100%;border-collapse:collapse}th,td{padding:6px 8px;text-align:left;border-bottom:1px solid var(--border);font-size:.85rem}th{background:var(--bg);color:var(--ts);font-weight:600}
.pg{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-top:12px;padding-top:8px;border-top:1px solid var(--border)}
.pg-info{font-size:.8rem;color:var(--ts)}.pg-btns{display:flex;gap:4px}.pg-btn{min-width:30px;height:30px;padding:0 6px;border:1px solid var(--border);border-radius:6px;background:var(--cb);color:var(--text);font-size:.8rem;cursor:pointer}.pg-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}.pg-btn:disabled{opacity:.4;cursor:default}.pg-btn:hover:not(:disabled):not(.active){border-color:var(--primary);color:var(--primary)}
.load{display:flex;align-items:center;justify-content:center;padding:40px}.load .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.load .lt{color:var(--ts);font-size:.9rem;margin-left:10px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:.85rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}.toast.show{opacity:1}.toast.e{background:var(--danger)}.toast.s{background:#27ae60}
.modal-o{display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,.5);align-items:center;justify-content:center}.modal-o.show{display:flex}.modal{background:var(--cb);border-radius:16px;padding:24px;width:90%;max-width:560px;max-height:80vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.3)}.modal h2{margin:0 0 16px;color:var(--primary);font-size:1.2rem}.mclose{float:right;background:none;border:none;font-size:1.5rem;cursor:pointer;color:var(--ts);padding:0;line-height:1}.token-item{display:flex;align-items:center;justify-content:space-between;padding:10px;border:1px solid var(--border);border-radius:8px;margin-bottom:8px;gap:8px;flex-wrap:wrap}.token-item .tv{font-family:'Courier New',monospace;font-size:.75rem;word-break:break-all;flex:1;min-width:100px;background:var(--bg);padding:4px 8px;border-radius:4px}.token-item .tn{font-size:.8rem;color:var(--ts);flex:1;min-width:60px}.token-item .ta{display:flex;gap:4px}.token-item .ta button{padding:3px 8px;border:1px solid var(--border);border-radius:5px;font-size:.75rem;cursor:pointer;background:var(--cb);transition:all .2s}.token-item .ta .cp{color:var(--primary)}.token-item .ta .cp:hover{background:var(--primary);color:#fff}.token-item .ta .ed{color:var(--ts)}.token-item .ta .ed:hover{border-color:var(--primary);color:var(--primary)}.token-item .ta .dl{color:var(--danger)}.token-item .ta .dl:hover{background:var(--danger);color:#fff}.tempty{text-align:center;color:var(--ts);padding:20px;font-size:.85rem}.tform{display:flex;gap:8px;margin-bottom:12px;align-items:center}.tform input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;font-size:.85rem;outline:none;background:var(--cb);color:var(--text)}.tform input:focus{border-color:var(--primary)}.tform button{padding:8px 16px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-size:.85rem;cursor:pointer;white-space:nowrap}.tfull{font-size:.75rem;background:var(--bg);padding:4px 8px;border-radius:4px;word-break:break-all;margin-top:4px;cursor:pointer;border:1px dashed var(--border)}.ann-item{padding:10px 14px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px}.ann-item.p{background:#fef6e4}.ann-head{display:flex;align-items:center;gap:6px;margin-bottom:2px}.ann-head .atitle{font-size:.95rem;font-weight:600}.ann-head .adate{font-size:.7rem;color:var(--ts);margin-left:auto}.ann-body{font-size:.85rem;color:var(--ts);line-height:1.6;display:none}.ann-toggle{font-size:.75rem;color:var(--primary);background:none;border:none;cursor:pointer;padding:2px 0}
.ban-top{background:#fef0f0;border-radius:8px;padding:10px 14px;margin-bottom:6px;color:var(--danger);font-size:.8rem}
.ban-top details summary{cursor:pointer;color:var(--ts);font-size:.75rem;margin-top:4px}
.da{position:relative;display:inline-block}.da-tg{padding:4px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--primary);cursor:pointer;font-size:.8rem;display:inline-flex;align-items:center;gap:4px;white-space:nowrap}
.da-m{display:none;position:absolute;right:0;top:100%;z-index:100;min-width:100px;background:var(--cb);border:1px solid var(--border);border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);overflow:hidden;margin-top:2px}
.da.open .da-m{display:block}.da-m div{padding:7px 12px;cursor:pointer;font-size:.8rem;color:var(--text);transition:background .15s}.da-m div:hover{background:var(--bg);color:var(--primary)}.da-m div+div{border-top:1px solid var(--border)}.da-m .df{font-weight:600;color:var(--primary)}
.load-overlay{display:flex;position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.7);align-items:center;justify-content:center;flex-direction:column}.load-overlay .lo-spin{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}.load-overlay .lo-txt{color:#fff;font-size:1rem;margin-top:14px}@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){.hdr{position:static;transform:none;margin-top:6px;justify-content:center;flex-wrap:wrap}.hd h1{font-size:1.8rem}.wrap{padding:10px}.search{flex-direction:column}.search .btn{width:100%}}
</style></head><body>
<div class="wrap" id="mainWrap" style="display:none">
<div class="hd"><div style="text-align:left;margin-bottom:4px"><span class="ui"><span class="un" id="dun"></span><span id="drole"></span></span></div>
<h1 style="margin:0;color:var(--primary);font-size:2.5rem;letter-spacing:2px">SO NOVEL</h1><a id="vtag" class="vtag" target="_blank">version</a>
<div class="hdr">
<button class="thm-btn" id="themeBtn" title="主题">🌙</button>
<button class="hdr-btn" id="setBtn">⚙设置</button>
<a href="/api-docs.html" class="hdr-btn" target="_blank">📖API文档</a>
<button class="hdr-btn" id="tkBtn">🔑Token</button>
<a href="/admin.html" class="hdr-btn" id="adLink" style="display:none">管理</a>
<button class="hdr-btn d" id="loBtn">退出</button></div></div>

<!-- Settings panel -->
<div class="sec" id="setP" style="display:none"><h2>偏好设置</h2><p class="sc-hint">仅保存在浏览器本地</p>
<div style="display:flex;flex-wrap:wrap;gap:8px 20px"><div><label style="font-size:.85rem;display:block;margin-bottom:2px">下载格式</label><select id="sf" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;background:var(--cb);color:var(--text)"><option value="">默认</option><option value="epub">EPUB</option><option value="txt">TXT</option><option value="html">HTML</option><option value="pdf">PDF</option></select></div>
<div><label style="font-size:.85rem;display:block;margin-bottom:2px">语言</label><select id="sl" style="padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;background:var(--cb);color:var(--text)"><option value="">自动</option><option value="zh_CN">简体</option><option value="zh_TW">繁体(台)</option><option value="zh_Hant">繁体</option></select></div>
<div><label style="font-size:.85rem;display:block;margin-bottom:2px">每页</label><input type="number" id="sp" min="10" placeholder="默认" style="width:70px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;background:var(--cb);color:var(--text)"></div>
<div><label style="font-size:.85rem;display:block;margin-bottom:2px">并发</label><input type="number" id="sc" min="1" placeholder="默认" style="width:70px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-size:.85rem;background:var(--cb);color:var(--text)"></div></div></div>

<!-- Banned log (public, top of page) -->
<div class="sec" id="banSec"><h2>🚫 违规封号名单</h2><div id="banList" style="font-size:.85rem;color:var(--ts)">加载中...</div></div>

<!-- Announcements -->
<div class="sec" id="annSec" style="display:none"><h2>📢 系统公告</h2><div id="annList"></div></div>

<!-- Search -->
<div class="sec" id="srcSec"><h2>搜索书籍</h2><div class="search"><input id="kw" placeholder="请输入书名或作者"><button class="btn btn-p" id="srcBtn">搜索</button></div>
<div id="tb1" style="display:none"><div style="overflow-x:auto"><table><thead><tr><th>No</th><th>书名</th><th>作者</th><th>最新章节</th><th>更新</th><th>书源</th><th>操作</th></tr></thead><tbody id="srTB"></tbody></table></div><div class="pg" id="pg"></div></div></div>

<!-- Local books -->
<div class="sec"><div class="sh"><h2>已下书籍</h2><button class="btn btn-p" id="rfBtn" style="padding:6px 16px;font-size:.8rem">刷新</button></div>
<div id="tb2" style="display:none"><div style="overflow-x:auto"><table><thead><tr><th>文件名</th><th>大小</th><th>时间</th><th>操作</th></tr></thead><tbody id="lbTB"></tbody></table></div></div></div></div>

<!-- Token modal -->
<div class="modal-o" id="tkM"><div class="modal"><button class="mclose" id="tkMc">&times;</button><h2>🔑 API Token 管理</h2>
<p style="font-size:.8rem;color:var(--ts);margin-bottom:12px">Token供第三方程序调用API。<br>使用方式详见 <a href="/api-docs.html" target="_blank" style="color:var(--primary)">API文档</a></p>
<div class="tform"><input type="text" id="ntNote" placeholder="备注（如：下载脚本）" maxlength="50"><button id="ntBtn">创建</button></div><div id="tkList"></div></div></div>

<div class="load-overlay" id="loadO" style="display:none"><div class="lo-spin"></div><div class="lo-txt" id="loadT">加载中...</div></div>
<div class="toast" id="toast"></div>

<script>
function $(id){return document.getElementById(id)}
function gd(d){return (d&&d.data!==undefined)?d.data:d}
function t(m,c){var e=$('toast');e.textContent=m;e.className='toast show'+(c?' '+c:'');setTimeout(function(){e.classList.remove('show')},2500)}
function showLoad(m){$('loadT').textContent=m||'加载中...';$('loadO').style.display='flex'}
function hideLoad(){$('loadO').style.display='none'}
var SET_KEY='sonovel-settings';var scfg={};
function ls(){try{var s=JSON.parse(localStorage.getItem(SET_KEY)||'{}');$('sf').value=s.f||'';$('sl').value=s.l||'';$('sp').value=s.sp||'';$('sc').value=s.sc||''}catch(e){}}
function ss(){localStorage.setItem(SET_KEY,JSON.stringify({f:$('sf').value,l:$('sl').value,sp:$('sp').value,sc:$('sc').value}))}
function defl(){var d=$('sf').value?$('sf').value.toUpperCase():(scfg.extName||'EPUB').toUpperCase();document.querySelectorAll('.df').forEach(function(e){e.textContent=d+' (默认)'})}

$('setBtn').addEventListener('click',function(){var p=$('setP');p.style.display=p.style.display==='none'?'':'none'});
$('sf').addEventListener('change',function(){ss();defl()});
$('sl').addEventListener('change',ss);$('sp').addEventListener('change',ss);$('sc').addEventListener('change',ss);

var cu=null,bookCache=[],page=1,lastFN='',th='light';

// Theme
th=localStorage.getItem('sonovel-theme')||'light';document.documentElement.setAttribute('data-theme',th);$('themeBtn').textContent=th==='light'?'🌙':'☀️';
$('themeBtn').addEventListener('click',function(){th=th==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',th);localStorage.setItem('sonovel-theme',th);this.textContent=th==='light'?'🌙':'☀️'});

// Auth
async function ca(){try{var r=await fetch('/api/auth/check');var d=await r.json();if(d.code===403||d.code===410){var m=d.message||'您的账户已被封禁或删除';var p=document.createElement('div');p.style.cssText='position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center';p.innerHTML='<div style="background:var(--cb);border-radius:16px;padding:32px;width:90%;max-width:440px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,.3)"><div style="font-size:3rem;margin-bottom:10px">🚫</div><h3 style="color:var(--danger);margin-bottom:10px">访问被拒绝</h3><p style="font-size:.95rem;color:var(--text);line-height:1.7;margin-bottom:16px">'+m+'</p><button onclick="location.href=\'/login.html\'" style="padding:10px 24px;border:none;border-radius:8px;background:var(--primary);color:#fff;cursor:pointer;font-size:.9rem">返回登录页</button></div>';document.body.appendChild(p);return null}cu=gd(d);$('dun').textContent=cu.username;$('drole').textContent=cu.role==='admin'?'(管理员)':'';if(cu.role==='admin')$('adLink').style.display='inline-block';return cu}catch(e){window.location.href='/login.html';return null}}

// Fetch config
async function fc(){try{var r=await fetch('/config');var d=gd(await r.json());scfg=d;$('vtag').innerHTML='后端 v'+(d.version||'?')+' | 前端 v1.0';$('vtag').href='https://github.com/linlelest/so-novel-web/releases/tag/v'+d.version}catch(e){}defl()}

// Search
function sz(b){if(b!==undefined)bookCache=b;var ps=parseInt($('sp').value)||20,tp=Math.max(1,Math.ceil(bookCache.length/ps));if(page>tp)page=tp;if(page<1)page=1;var s=(page-1)*ps,e=Math.min(s+ps,bookCache.length),pd=bookCache.slice(s,e);var d=$('sf').value?$('sf').value.toUpperCase():(scfg.extName||'EPUB').toUpperCase();
$('srTB').innerHTML=pd.map(function(it,i){var idx=s+i;return'<tr><td>'+(idx+1)+'</td><td>'+it.bookName+'</td><td>'+it.author+'</td><td>'+(it.latestChapter||'')+'</td><td>'+(it.lastUpdateTime||'')+'</td><td>'+it.sourceName+'</td><td><div class="da"><button class="da-tg" data-idx="'+idx+'">下载为 ▾</button><div class="da-m"><div class="df" data-f="" data-idx="'+idx+'">'+d+' (默认)</div><div data-f="epub" data-idx="'+idx+'">EPUB</div><div data-f="txt" data-idx="'+idx+'">TXT</div><div data-f="html" data-idx="'+idx+'">HTML</div><div data-f="pdf" data-idx="'+idx+'">PDF</div></div></div></td></tr>'}).join('');
renderPg(tp);if(bookCache.length>0)$('tb1').style.display=''}
function renderPg(tp){var el=$('pg');if(tp<=1){el.innerHTML='';return}
var html='<span class="pg-info">共'+bookCache.length+'条，第'+page+'/'+tp+'页</span><div class="pg-btns"><button class="pg-btn" data-p="prev"'+(page<=1?' disabled':'')+'>上一页</button>';
var ms=5,sp=Math.max(1,page-Math.floor(ms/2)),ep=Math.min(tp,sp+ms-1);if(ep-sp<ms-1)sp=Math.max(1,ep-ms+1);
if(sp>1){html+='<button class="pg-btn" data-p="1">1</button>';if(sp>2)html+='<span style="padding:0 4px;color:var(--ts)">…</span>'}
for(var i=sp;i<=ep;i++)html+='<button class="pg-btn'+(i===page?' active':'')+'" data-p="'+i+'">'+i+'</button>';
if(ep<tp){if(ep<tp-1)html+='<span style="padding:0 4px;color:var(--ts)">…</span>';html+='<button class="pg-btn" data-p="'+tp+'">'+tp+'</button>'}
html+='<button class="pg-btn" data-p="next"'+(page>=tp?' disabled':'')+'>下一页</button></div>';el.innerHTML=html}

$('srcBtn').addEventListener('click',async function(){var v=$('kw').value.trim();if(!v){t('请输入书名','e');return}this.disabled=true;$('kw').disabled=true;showLoad('搜索中...');
try{var r=await fetch('/search/aggregated?kw='+encodeURIComponent(v));var d=gd(await r.json());if(d){page=1;sz(d)}}catch(e){t('搜索失败','e')}finally{this.disabled=false;$('kw').disabled=false;hideLoad()}});
$('kw').addEventListener('keydown',function(e){if(e.key==='Enter')$('srcBtn').click()});
$('tb1').addEventListener('click',function(e){var pg=e.target.closest('.pg-btn');if(pg&&!pg.disabled){var p=pg.dataset.p;var tp=Math.ceil(bookCache.length/(parseInt($('sp').value)||20));if(p==='prev')page--;else if(p==='next')page++;else page=parseInt(p);page=Math.max(1,Math.min(page,tp));sz()}});
// Download menu
$('srTB').addEventListener('click',function(e){var tg=e.target.closest('.da-tg');if(tg){e.stopPropagation();var a=tg.closest('.da');document.querySelectorAll('.da.open').forEach(function(el){if(el!==a)el.classList.remove('open')});a.classList.toggle('open');return}
var item=e.target.closest('[data-f]');if(item){item.closest('.da').classList.remove('open');hdts(parseInt(item.dataset.idx),item.dataset.f)}});
document.addEventListener('click',function(){document.querySelectorAll('.da.open').forEach(function(el){el.classList.remove('open')})});
async function hdts(idx,fmt){var item=bookCache[idx];if(!item){t('参数错误','e');return}showLoad('准备下载...');
var p=new URLSearchParams(item);var fmt2=fmt||$('sf').value||'';if(fmt2)p.set('format',fmt2);if($('sl').value)p.set('language',$('sl').value);if($('sc').value)p.set('concurrency',$('sc').value);
try{var r=await fetch('/book-fetch?'+p.toString());var d=await r.json();var data=gd(d);if(!r.ok||d.code!==200){t(d.message||'失败','e');hideLoad()}else{var fn=data.fileName||'';$('loadT').textContent='下载完成！'+fn;setTimeout(function(){hideLoad();if(fn){var ifr=document.createElement('iframe');ifr.style.display='none';ifr.src='/book-download?filename='+encodeURIComponent(fn);document.body.appendChild(ifr)}flb()},1500)}}catch(e){t('下载失败','e');hideLoad()}}

// Local books
async function flb(){showLoad('正在刷新...');try{var r=await fetch('/local-books');var d=gd(await r.json());if(d&&d.length){d.sort(function(a,b){return b.timestamp-a.timestamp});if(d[0])lastFN=d[0].name;renderLB(d)}}catch(e){}finally{hideLoad()}}
function renderLB(data){$('lbTB').innerHTML=data.map(function(it){return'<tr><td>'+it.name+'</td><td>'+fs(it.size)+'</td><td>'+fd(it.timestamp)+'</td><td><button class="btn btn-p" data-fn="'+it.name+'" style="padding:4px 14px;font-size:.75rem">下载</button></td></tr>'}).join('');if(data.length>0)$('tb2').style.display=''}
$('rfBtn').addEventListener('click',flb);
$('lbTB').addEventListener('click',function(e){var b=e.target.closest('[data-fn]');if(b)window.open('/book-download?filename='+encodeURIComponent(b.dataset.fn),'_blank')});
function fs(b){if(b===0)return'0 B';var k=1024,s=['B','KB','MB','GB'];var i=Math.floor(Math.log(b)/Math.log(k));return(b/Math.pow(k,i)).toFixed(2)+' '+s[i]}
function fd(ts){return new Date(ts).toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})}

// Token
var tkM=$('tkM');
async function lt(){try{var r=await fetch('/api/tokens?_='+Date.now());var list=gd(await r.json())||[];if(!list.length){$('tkList').innerHTML='<div class="tempty">暂无Token</div>';return}
$('tkList').innerHTML=list.map(function(t){return'<div class="token-item"><div style="flex:2;min-width:120px"><div class="tv" onclick="cp(\''+t.token+'\')" style="cursor:pointer;color:var(--primary);background:var(--bg);padding:6px 10px;border-radius:6px;border:1px solid var(--border);text-align:center;font-size:.85rem;transition:all .2s">'+t.token+' 📋</div></div><div class="tn">'+(t.note||'无备注')+'</div><div class="tn" style="display:none" id="ne'+t.id+'"><input style="padding:3px 6px;border:1px solid var(--primary);border-radius:4px;font-size:.75rem;width:100px" type="text" value="'+(t.note||'')+'" id="ni'+t.id+'"><button style="padding:3px 8px;border:none;border-radius:4px;background:var(--primary);color:#fff;font-size:.7rem" onclick="sn('+t.id+')">保存</button></div><div class="ta"><button class="ed" onclick="te('+t.id+')">备注</button><button class="dl" onclick="dt('+t.id+')">删除</button></div></div>'}).join('')}catch(e){console.error(e)}}
window.cp=function(v){var ta=document.createElement('textarea');ta.value=v;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');t('已复制')}catch(e){t('复制失败','e')}document.body.removeChild(ta)};
window.te=function(id){document.getElementById('ne'+id).style.display='block';};
window.sn=async function(id){var note=document.getElementById('ni'+id).value;try{var r=await fetch('/api/tokens',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:id,note:note})});var d=await r.json();if(r.ok&&d.code===200){t('更改成功，刷新页面或重新进入此弹窗生效','s');lt();tkM.classList.add('show')}else t(d.message||'失败','e')}catch(e){t('失败','e')}};
$('tkBtn').addEventListener('click',function(){tkM.classList.add('show');lt()});
$('tkMc').addEventListener('click',function(){tkM.classList.remove('show')});
tkM.addEventListener('click',function(e){if(e.target===tkM)tkM.classList.remove('show')});
$('ntBtn').addEventListener('click',async function(){var note=$('ntNote').value.trim();try{var r=await fetch('/api/tokens',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({note:note})});var d=await r.json();if(r.ok&&d.code===200){t('创建成功，刷新页面或重新进入此弹窗生效','s');$('ntNote').value=''}else t(d.message||'创建失败','e')}catch(e){t('网络错误','e')}});
window.dt=async function(id){if(!confirm('确定删除Token?'))return;try{var r=await fetch('/api/tokens?id='+id,{method:'DELETE'});var d=await r.json();if(r.ok&&d.code===200){t('删除成功，刷新页面或重新进入此弹窗生效','s')}else t(d.message||'删除失败','e')}catch(e){t('网络错误','e')}};

// Announcements
async function la(){try{var r=await fetch('/api/announcements/list');var list=gd(await r.json())||[];if(!list.length)return;$('annSec').style.display='';
$('annList').innerHTML=list.map(function(a){return'<div class="ann-item'+(a.pinned?' p':'')+'"><div class="ann-head">'+(a.pinned?'<span style="font-size:1.1rem">📌</span>':'')+'<span class="atitle">'+a.title+'</span><span class="adate">'+new Date(a.updatedAt).toLocaleDateString('zh-CN')+'</span></div><div class="ann-body" data-id="'+a.id+'">加载中...</div><button class="ann-toggle" data-id="'+a.id+'">展开阅读</button></div>'}).join('');
$('annList').addEventListener('click',async function(e){var btn=e.target.closest('.ann-toggle');if(!btn)return;var id=btn.dataset.id,bd=$('annList').querySelector('.ann-body[data-id="'+id+'"]');
if(bd.style.display==='none'||!bd.style.display){if(bd.textContent==='加载中...'){try{var r2=await fetch('/api/announcements/detail?id='+id);var d2=gd(await r2.json());bd.innerHTML=m2h(d2.content||'(空)')}catch(e){bd.textContent='加载失败'}}bd.style.display='block';btn.textContent='收起'}else{bd.style.display='none';btn.textContent='展开阅读'}})}catch(e){}}
function m2h(tx){if(!tx)return'';var h=tx.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');h=h.replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^# (.+)$/gm,'<h1>$1</h1>');h=h.replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>');h=h.replace(/`([^`]+)`/g,'<code>$1</code>');h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');h=h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');h=h.replace(/\*([^*]+)\*/g,'<em>$1</em>');return h}

// Banned log — always visible on homepage, collapsed by default
async function lbl(){try{var r=await fetch('/api/public/bannedlog');var list=gd(await r.json())||[];
if(!list.length){$('banList').innerHTML='<p style="font-size:.8rem;color:var(--ts);padding:4px 0">暂无封号记录</p>';return}
var top=list[0];var html='<div class="ban-top">⚠ <b>最新封号：</b>'+top.username+'，原因：'+top.reason+' ('+new Date(top.createdAt).toLocaleString('zh-CN')+')</div>';
if(list.length>1){html+='<details style="margin-top:4px"><summary style="cursor:pointer;color:var(--ts);font-size:.8rem;padding:4px 0">查看全部 ('+list.length+'条记录)</summary><div style="padding:4px 0">'+list.slice(1).map(function(l){return'<p style="margin:2px 0;font-size:.8rem;color:var(--ts)">'+l.username+'，原因：'+l.reason+' ('+new Date(l.createdAt).toLocaleString('zh-CN')+')</p>'}).join('')+'</div></details>'}
$('banList').innerHTML=html}catch(e){}}

$('loBtn').addEventListener('click',async function(){await fetch('/api/auth/logout',{method:'POST'});window.location.href='/login.html'});

// SSE 下载进度
function initSSE(){var es=new EventSource('/download-progress');es.onmessage=function(e){try{var d=JSON.parse(e.data);if(d.type==='download-progress'){$('loadT').textContent=d.index+' / '+d.total}}catch(err){}}}

ca().then(function(s){if(!s)return;ls();fc();flb();la();lbl();initSSE();$('mainWrap').style.display=''});

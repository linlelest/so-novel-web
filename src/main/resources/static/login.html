<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta content="width=device-width,initial-scale=1.0" name="viewport">
<title>SoNovel - 登录</title><style>:root{--primary:#5d5d81;--ph:#7b7b9d;--bg:#f8f9fa;--cb:#fff;--text:#333;--ts:#666;--border:#e5e5e5;--err:#e74c3c;--ok:#27ae60;--shadow:0 8px 32px rgba(0,0,0,.1)}[data-theme="dark"]{--bg:#1a1a2e;--cb:#16213e;--text:#e0e0e0;--ts:#a0a0a0;--border:#2a2a4a;--primary:#8b8bb0;--ph:#a0a0c0;--shadow:0 8px 32px rgba(0,0,0,.5)}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;transition:background .3s}.ac{background:var(--cb);border-radius:16px;box-shadow:var(--shadow);padding:40px;width:100%;max-width:420px;transition:background .3s}.logo{text-align:center;margin-bottom:32px}.logo h1{font-size:2rem;color:var(--primary);letter-spacing:2px;margin:0}.logo p{color:var(--ts);margin-top:8px;font-size:.9rem}.fg{margin-bottom:20px}.fg label{display:block;margin-bottom:6px;color:var(--text);font-weight:500;font-size:.9rem}.fg input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:1rem;outline:none;background:var(--cb);color:var(--text);transition:border-color .2s}.fg input:focus{border-color:var(--primary)}.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer;transition:all .2s}.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--ph)}.btn-p:disabled{opacity:.6;cursor:not-allowed}.msg{font-size:.85rem;margin-top:12px;text-align:center;display:none}.msg-e{color:var(--err)}.msg-s{color:var(--ok)}.tl{text-align:center;margin-top:16px;font-size:.9rem;color:var(--ts)}.tl a{color:var(--primary);text-decoration:none;cursor:pointer}.tl a:hover{text-decoration:underline}.ib{background:#f0f9eb;border:1px solid #e1f3d8;border-radius:10px;padding:16px;margin-bottom:24px;text-align:center;color:#529b2e;font-size:.9rem;display:none}.loading{text-align:center;padding:40px;color:var(--ts)}.hidden{display:none!important}.thm-btn{position:fixed;top:12px;right:16px;background:none;border:1px solid var(--border);border-radius:20px;cursor:pointer;font-size:1.2rem;padding:6px 12px;color:var(--text);z-index:10}.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:8px;font-size:.85rem;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;max-width:90%;text-align:center}.toast.show{opacity:1}.toast.e{background:var(--err)}.toast.s{background:var(--ok)}</style></head><body>
<button class="thm-btn" id="themeBtn" title="切换主题">🌓</button>
<div class="ac"><div class="logo"><h1>SO NOVEL</h1><p>网络小说下载与管理平台</p></div>
<div class="loading" id="load">加载中...</div>
<div id="adminReg" class="hidden"><div class="ib" style="display:block">🎉 首次使用！请注册管理员账号</div>
<div class="fg"><label>管理员用户名</label><input type="text" id="arUser" placeholder="输入管理员用户名" autocomplete="username"></div>
<div class="fg"><label>管理员密码</label><input type="password" id="arPw" placeholder="至少6个字符" autocomplete="new-password"></div>
<button class="btn btn-p" id="arBtn">注册管理员</button></div>
<div id="loginF" class="hidden"><div class="fg"><label>用户名</label><input type="text" id="lgUser" placeholder="输入用户名" autocomplete="username"></div>
<div class="fg"><label>密码</label><input type="password" id="lgPw" placeholder="输入密码" autocomplete="current-password"></div>
<div class="fg"><label class="ck" style="display:flex;align-items:center;gap:6px;cursor:pointer"><input type="checkbox" id="remember" checked style="width:16px;height:16px"> 记住登录状态</label></div>
<button class="btn btn-p" id="lgBtn">登 录</button><div class="tl">还没有账号？<a id="goReg">立即注册</a></div></div>
<div id="regF" class="hidden"><div class="fg"><label>用户名</label><input type="text" id="regUser" placeholder="2-20个字符" autocomplete="username"></div>
<div class="fg"><label>密码</label><input type="password" id="regPw" placeholder="至少4个字符" autocomplete="new-password"></div>
<button class="btn btn-p" id="regBtn">注 册</button><div class="tl">已有账号？<a id="goLogin">返回登录</a></div></div></div>
<div class="toast" id="toast"></div>
<script>function $(id){return document.getElementById(id)}function show(e){e.classList.remove('hidden')}function hide(e){e.classList.add('hidden')}
function gd(d){return(d&&d.data!==undefined)?d.data:d}
function t(m,c){var el=$('toast');el.textContent=m;el.className='toast show'+(c?' '+c:'');setTimeout(function(){el.classList.remove('show')},2500)}

// Theme
var theme=localStorage.getItem('sonovel-theme')||'light';document.documentElement.setAttribute('data-theme',theme);
$('themeBtn').addEventListener('click',function(){theme=theme==='light'?'dark':'light';document.documentElement.setAttribute('data-theme',theme);localStorage.setItem('sonovel-theme',theme);this.textContent=theme==='light'?'🌙':'☀️'});
if(theme==='dark')$('themeBtn').textContent='☀️';

async function init(){try{var r=await fetch('/api/auth/check-admin');var d=gd(await r.json());$('load').style.display='none';
if(!d.hasAdmin){show($('adminReg'))}else{show($('loginF'))}}catch(e){$('load').textContent='服务器连接失败'}}

$('lgBtn').addEventListener('click',async function(){var u=$('lgUser').value.trim(),p=$('lgPw').value,rb=$('remember').checked;
if(!u||!p){t('请输入用户名和密码','e');return}
try{var r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p,remember:rb})});var d=await r.json();
if(r.ok&&d.code===200){t('登录成功');setTimeout(function(){window.location.href='/'},500)}
else{t(d.message||'登录失败','e');if(d.code===403)t(d.message,'e')}}catch(e){t('网络错误','e')}});

$('lgPw').addEventListener('keydown',function(e){if(e.key==='Enter')$('lgBtn').click()});
$('arBtn').addEventListener('click',async function(){var u=$('arUser').value.trim(),p=$('arPw').value;
if(!u||!p){t('请填写用户名和密码','e');return}if(p.length<6){t('密码至少6个字符','e');return}
try{var r=await fetch('/api/auth/admin-register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});var d=await r.json();
if(r.ok&&d.code===200){t('管理员注册成功');setTimeout(function(){window.location.href='/'},500)}else t(d.message||'注册失败','e')}catch(e){t('网络错误','e')}});
$('goReg').addEventListener('click',function(){hide($('loginF'));show($('regF'))});
$('goLogin').addEventListener('click',function(){hide($('regF'));show($('loginF'))});
$('regBtn').addEventListener('click',async function(){var u=$('regUser').value.trim(),p=$('regPw').value;
if(!u||!p){t('请填写用户名和密码','e');return}
try{var r=await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});var d=await r.json();
if(r.ok&&d.code===200){t('注册成功，请返回登录','s');$('regUser').value='';$('regPw').value='';hide($('regF'));show($('loginF'))}else t(d.message||'注册失败','e')}catch(e){t('网络错误','e')}});
init();</script></body></html>

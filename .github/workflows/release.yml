name: Releases

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release-windows:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build Windows amd64
        run: bash bin/release-windows.sh
      - name: Upload Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-amd64
          path: dist/sonovel-windows.tar.gz

  release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'
      - name: Build Linux x64 + arm64
        run: |
          bash bin/release-linux.sh x64
          bash bin/release-linux.sh arm64
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-amd64
          path: dist
        continue-on-error: true
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "dist/*"
          token: ${{ secrets.GITHUB_TOKEN }} 